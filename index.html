<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Oliver's Auto</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%9A%97%3C/text%3E%3C/svg%3E">
<style>
  :root{
    --p1:#ff5fa2; --p2:#ffd23f; --p3:#3fd0ff; --p4:#8a5cff;
  }
  *{box-sizing:border-box; margin:0; padding:0; -webkit-user-select:none; user-select:none; -webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:"Comic Sans MS","Trebuchet MS",system-ui,sans-serif;
    min-height:100vh;
    color:#38314f;
    text-align:center;
    background:linear-gradient(120deg,var(--p4),var(--p1),var(--p2),var(--p3));
    background-size:400% 400%;
    animation:flow 16s ease infinite;
    padding:24px 14px 50px;
    overflow-x:hidden;
  }
  @keyframes flow{0%{background-position:0% 50%;}50%{background-position:100% 50%;}100%{background-position:0% 50%;}}

  h1{
    font-size:clamp(1.9rem,8vw,2.8rem);
    color:#fff;
    text-shadow:3px 3px 0 rgba(0,0,0,0.15);
    animation:pop 2.5s ease-in-out infinite;
  }
  @keyframes pop{0%,100%{transform:scale(1) rotate(-1deg);}50%{transform:scale(1.04) rotate(1deg);}}
  .sub{font-size:clamp(0.95rem,3.5vw,1.15rem); color:#fff; margin:4px 0 22px; text-shadow:1px 1px 0 rgba(0,0,0,0.12);}

  /* ---- car screen bezel ---- */
  .dashboard{
    max-width:600px; margin:0 auto; aspect-ratio:16/9;
    background:#111827; border-radius:26px; border:10px solid #2a2a35;
    box-shadow:0 10px 0 rgba(0,0,0,0.25), 0 0 0 3px rgba(255,255,255,0.15);
    position:relative; overflow:hidden;
  }
  .statusbar{
    display:flex; align-items:center; justify-content:space-between;
    padding:6px 12px; color:#e5e7eb; font-size:0.8rem; font-weight:bold;
  }
  .backbtn{background:none; border:none; color:#e5e7eb; font-size:1.3rem; cursor:pointer; visibility:hidden; padding:0 4px;}
  .statusicons{font-size:0.85rem;}
  .statusbar-right{display:flex; align-items:center; gap:10px;}
  .mic-btn{background:none; border:none; color:#e5e7eb; font-size:1rem; cursor:pointer; padding:0 2px;}
  .mic-btn.listening{animation:micPulse 0.8s ease-in-out infinite; color:#4285f4;}
  @keyframes micPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.3);}}

  .assistant-banner{
    position:absolute; bottom:8px; left:8px; right:8px;
    background:linear-gradient(120deg,#4285f4,#9b72cb,#d96570); color:#fff;
    padding:10px 12px; border-radius:12px; text-align:center; font-size:0.78rem; font-weight:bold;
    z-index:20; display:none; box-shadow:0 4px 10px rgba(0,0,0,0.3);
  }

  .car-screen{display:none; position:relative; height:calc(100% - 30px);}
  .car-screen.active{display:block;}

  /* ---- home ---- */
  .app-grid{display:flex; flex-wrap:wrap; gap:18px; justify-content:center; align-items:center; height:100%; padding:10px;}
  .car-app{display:flex; flex-direction:column; align-items:center; gap:5px; background:none; border:none; cursor:pointer;}
  .car-icon{
    width:58px; height:58px; border-radius:15px; display:flex; align-items:center; justify-content:center;
    font-size:1.7rem; box-shadow:0 4px 0 rgba(0,0,0,0.3); transition:transform .08s ease;
  }
  .car-app:active .car-icon{transform:translateY(3px); box-shadow:0 1px 0 rgba(0,0,0,0.3);}
  .car-label{font-size:0.7rem; color:#e5e7eb; font-weight:bold;}
  .car-icon.maps{background:#137333;}
  .car-icon.spotify{background:#1db954;}
  .car-icon.teams{background:#5b5fc7;}
  .car-icon.pocketcasts{background:#f43e37;}
  .car-icon.multiscreen{background:#374151;}

  /* ---- maps ---- */
  .map-bg{position:absolute; inset:0; background:#dbe9d8; overflow:hidden;}
  .road{position:absolute; left:8%; top:0; width:16%; height:100%; background:#4a4a55; transform:skewX(-10deg);}
  .road::after{content:""; position:absolute; left:50%; top:0; width:2px; height:100%; background:repeating-linear-gradient(#fff 0 10px, transparent 10px 20px); transform:translateX(-50%);}
  .car-dot{position:absolute; left:20%; top:75%; font-size:1.5rem; transition:left 2s ease, top 2s ease; z-index:2;}
  .home-pin{position:absolute; left:78%; top:14%; font-size:1.7rem; z-index:1;}
  .dest-pin{position:absolute; font-size:1.6rem; z-index:1; display:none;}
  .nav-banner{
    position:absolute; bottom:8px; left:8px; right:8px; background:rgba(0,0,0,0.7); color:#fff;
    padding:8px; border-radius:10px; text-align:center; font-size:0.8rem; z-index:3; display:none;
  }
  .map-search-panel{
    position:absolute; top:8px; left:8px; right:8px; background:rgba(17,24,39,0.95);
    border-radius:14px; padding:10px; z-index:4;
  }
  .map-search-row{display:flex; align-items:center; gap:6px;}
  .search-input{flex:1; background:rgba(255,255,255,0.92); border:none; border-radius:10px; padding:8px 10px; font-size:0.8rem; color:#333; font-family:inherit;}
  .quick-toggle-btn{
    flex-shrink:0; width:30px; height:30px; background:rgba(255,255,255,0.15); border:none; border-radius:8px;
    color:#e5e7eb; font-size:0.85rem; cursor:pointer;
  }
  .quick-toggle-btn:active{transform:translateY(1px);}
  .no-results{display:none; color:#e5e7eb; font-size:0.8rem; opacity:0.8; padding:10px; text-align:center;}
  .quick-places{display:grid; grid-template-columns:repeat(2,1fr); gap:8px; margin-top:8px;}
  .category-btn{
    background:rgba(255,255,255,0.12); border:none; border-radius:10px; padding:10px; color:#e5e7eb;
    font-size:0.8rem; font-weight:bold; cursor:pointer; font-family:inherit;
    display:flex; flex-direction:column; align-items:center; gap:4px;
  }
  .category-btn:active{transform:translateY(2px);}

  /* ---- spotify / pocket casts player ---- */
  .player-card{display:flex; flex-direction:column; align-items:center; justify-content:center; height:100%; color:#e5e7eb; gap:8px; padding:10px;}
  .album-art{
    width:90px; height:90px; border-radius:16px; display:flex; align-items:center; justify-content:center;
    font-size:2.2rem; box-shadow:0 6px 10px rgba(0,0,0,0.3);
    background:linear-gradient(135deg,#1db954,#0e8a3e);
  }
  .album-art.pc{background:linear-gradient(135deg,#f43e37,#b8231e);}
  .album-art.spinning{animation:spin 3s linear infinite;}
  @keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
  .song-title{font-weight:bold; font-size:1rem;}
  .song-artist{font-size:0.8rem; opacity:0.8;}
  .progress-bar{width:75%; max-width:200px; height:6px; background:rgba(255,255,255,0.2); border-radius:3px; overflow:hidden;}
  .progress-fill{height:100%; width:35%; background:#e5e7eb; border-radius:3px;}
  .player-controls{display:flex; gap:16px; margin-top:4px;}
  .player-controls button{background:none; border:none; font-size:1.5rem; color:#e5e7eb; cursor:pointer;}

  .waveform{display:flex; gap:4px; align-items:flex-end; height:22px;}
  .waveform span{width:4px; background:#e5e7eb; height:6px; border-radius:2px; display:block;}
  .waveform.playing span{animation:bounce 0.6s ease-in-out infinite alternate;}
  .waveform.playing span:nth-child(2){animation-delay:0.1s;}
  .waveform.playing span:nth-child(3){animation-delay:0.2s;}
  .waveform.playing span:nth-child(4){animation-delay:0.3s;}
  .waveform.playing span:nth-child(5){animation-delay:0.15s;}
  @keyframes bounce{from{height:6px;}to{height:20px;}}

  /* ---- teams ---- */
  .teams-idle,.teams-incoming,.teams-active{
    display:none; flex-direction:column; align-items:center; justify-content:center; height:100%; gap:12px; color:#e5e7eb;
  }
  .teams-idle{display:flex;}
  .teams-icon{font-size:2.2rem;}
  .caller-name{font-weight:bold; font-size:1rem;}
  .call-actions{display:flex; gap:24px;}
  .call-btn{width:50px; height:50px; border-radius:50%; border:none; font-size:1.3rem; cursor:pointer; color:#fff;}
  .call-btn.answer{background:#22c55e;}
  .call-btn.decline{background:#ef4444;}
  .call-btn.leave{background:#ef4444; width:auto; border-radius:999px; padding:0 18px; font-size:0.9rem; font-weight:bold; height:40px;}
  .call-timer{font-size:1.2rem; font-weight:bold;}
  #simulateCallBtn{background:#fff; color:#111827; border:none; border-radius:999px; padding:9px 16px; font-weight:bold; cursor:pointer; font-family:inherit;}

  /* ---- multi-screen ---- */
  .split{display:flex; height:100%; gap:6px; padding:6px;}
  .split-panel{flex:1; background:#1f2937; border-radius:10px; position:relative; overflow:hidden; display:flex; flex-direction:column;}
  .split-panel.left .map-bg{position:absolute; inset:0;}
  .mini-search-btn{
    position:absolute; top:6px; left:6px; z-index:3; width:26px; height:26px; border-radius:50%;
    background:#fff; border:none; font-size:0.8rem; cursor:pointer; display:flex; align-items:center; justify-content:center;
    box-shadow:0 2px 0 rgba(0,0,0,0.2);
  }
  .mini-search-btn:active{transform:translateY(1px); box-shadow:0 1px 0 rgba(0,0,0,0.2);}
  .split-tabs{display:flex; justify-content:center; gap:6px; padding:6px;}
  .split-tab{background:rgba(255,255,255,0.15); border:none; border-radius:8px; padding:5px 9px; font-size:0.95rem; cursor:pointer;}
  .split-tab.selected{background:#fff;}
  .mini-player{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:6px; color:#e5e7eb;}
  .mini-album{font-size:1.5rem;}
  .mini-title{font-size:0.7rem; text-align:center; padding:0 8px;}
  .mini-play{background:none; border:none; font-size:1.1rem; color:#e5e7eb; cursor:pointer;}

  /* ---- drive controls (manual steering while navigating) ---- */
  .drive-controls{
    max-width:600px; margin:16px auto 0; display:none;
    flex-direction:column; align-items:center; gap:8px;
  }
  .drive-controls.visible{display:flex;}
  .drive-controls-label{color:#fff; font-size:0.85rem; font-weight:bold; text-shadow:1px 1px 0 rgba(0,0,0,0.12);}
  .dpad{
    display:grid; grid-template-columns:repeat(3,48px); grid-template-rows:repeat(2,48px);
    gap:6px; justify-content:center;
  }
  .dpad-btn{
    background:rgba(255,255,255,0.9); border:none; border-radius:12px; font-size:1.3rem; cursor:pointer;
    box-shadow:0 4px 0 rgba(0,0,0,0.25);
  }
  .dpad-btn:active{transform:translateY(3px); box-shadow:0 1px 0 rgba(0,0,0,0.25);}
  .dpad-up{grid-column:2; grid-row:1;}
  .dpad-left{grid-column:1; grid-row:2;}
  .dpad-down{grid-column:2; grid-row:2;}
  .dpad-right{grid-column:3; grid-row:2;}

  footer{margin-top:22px; font-size:0.8rem; color:#fff; opacity:0.85; text-shadow:1px 1px 0 rgba(0,0,0,0.1);}
</style>
</head>
<body>
  <h1>🚗 Oliver's Auto</h1>
  <p class="sub">Tap an app, or try Multi-Screen!</p>

  <div class="dashboard">
    <div class="statusbar">
      <button class="backbtn" id="backBtn">←</button>
      <div id="clock">10:32</div>
      <div class="statusbar-right">
        <button class="mic-btn" id="micBtn" title="Talk to Gemini">🎤</button>
        <div class="statusicons">📶 🔋</div>
      </div>
    </div>

    <!-- ==== HOME ==== -->
    <div class="car-screen active" id="screen-home">
      <div class="app-grid">
        <button class="car-app" data-screen="maps">
          <div class="car-icon maps">📍</div>
          <div class="car-label">Maps</div>
        </button>
        <button class="car-app" data-screen="spotify">
          <div class="car-icon spotify">🎵</div>
          <div class="car-label">Spotify</div>
        </button>
        <button class="car-app" data-screen="teams">
          <div class="car-icon teams">👥</div>
          <div class="car-label">Teams</div>
        </button>
        <button class="car-app" data-screen="pocketcasts">
          <div class="car-icon pocketcasts">🎧</div>
          <div class="car-label">Pocket Casts</div>
        </button>
        <button class="car-app" data-screen="multiscreen">
          <div class="car-icon multiscreen">⧉</div>
          <div class="car-label">Multi-Screen</div>
        </button>
      </div>
    </div>

    <!-- ==== MAPS ==== -->
    <div class="car-screen" id="screen-maps">
      <div class="map-bg">
        <div class="road"></div>
        <div class="home-pin">🏠</div>
        <div class="dest-pin" id="destPin"></div>
        <div class="car-dot" id="mapCarDot">🚗</div>
      </div>
      <div class="map-search-panel">
        <div class="map-search-row">
          <input type="text" class="search-input" id="searchInput" placeholder="🔍 Search here...">
          <button class="quick-toggle-btn" id="quickToggleBtn">▲</button>
        </div>
        <div class="quick-places" id="quickPlaces"></div>
        <div class="no-results" id="noResultsMsg">No results</div>
      </div>
      <div class="nav-banner" id="navBanner"></div>
    </div>

    <!-- ==== SPOTIFY ==== -->
    <div class="car-screen" id="screen-spotify">
      <div class="player-card">
        <div class="album-art" id="albumArt">🎵</div>
        <div class="song-title">Sunshine Groove</div>
        <div class="song-artist">The Backseat Band</div>
        <div class="progress-bar"><div class="progress-fill"></div></div>
        <div class="player-controls">
          <button id="spotifyPrev">⏮</button>
          <button id="spotifyPlay">▶️</button>
          <button id="spotifyNext">⏭</button>
        </div>
      </div>
    </div>

    <!-- ==== TEAMS ==== -->
    <div class="car-screen" id="screen-teams">
      <div class="teams-idle" id="teamsIdle">
        <div class="teams-icon">👥</div>
        <div>No active calls</div>
        <button id="simulateCallBtn">📞 Simulate Call</button>
      </div>
      <div class="teams-incoming" id="teamsIncoming">
        <div class="teams-icon">👥</div>
        <div class="caller-name">Team Meeting</div>
        <div class="call-actions">
          <button class="call-btn decline" id="declineBtn">✖</button>
          <button class="call-btn answer" id="answerBtn">📞</button>
        </div>
      </div>
      <div class="teams-active" id="teamsActive">
        <div class="teams-icon">👥</div>
        <div class="caller-name">Team Meeting</div>
        <div class="call-timer" id="callTimer">00:00</div>
        <button class="call-btn leave" id="leaveBtn">✖ Leave</button>
      </div>
    </div>

    <!-- ==== POCKET CASTS ==== -->
    <div class="car-screen" id="screen-pocketcasts">
      <div class="player-card">
        <div class="album-art pc" id="pcArt">🎧</div>
        <div class="song-title">Mystery Explorers</div>
        <div class="song-artist">Ep. 42: The Hidden Cave</div>
        <div class="waveform" id="pcWaveform"><span></span><span></span><span></span><span></span><span></span></div>
        <div class="player-controls">
          <button id="pcBack">⏪15</button>
          <button id="pcPlay">▶️</button>
          <button id="pcFwd">30⏩</button>
        </div>
      </div>
    </div>

    <!-- ==== MULTI-SCREEN ==== -->
    <div class="car-screen" id="screen-multiscreen">
      <div class="split">
        <div class="split-panel left">
          <div class="map-bg">
            <div class="road"></div>
            <div class="car-dot">🚗</div>
          </div>
          <button class="mini-search-btn" id="msSearchBtn">🔍</button>
        </div>
        <div class="split-panel right">
          <div class="split-tabs">
            <button class="split-tab selected" data-app="spotify">🎵</button>
            <button class="split-tab" data-app="teams">👥</button>
            <button class="split-tab" data-app="pocketcasts">🎧</button>
          </div>
          <div class="mini-player" id="miniPlayer"></div>
        </div>
      </div>
    </div>

    <div class="assistant-banner" id="assistantBanner"></div>
  </div>

  <div class="drive-controls" id="driveControls">
    <div class="drive-controls-label">🕹️ You're driving! Steer the car:</div>
    <div class="dpad">
      <button class="dpad-btn dpad-up" id="driveUp">⬆️</button>
      <button class="dpad-btn dpad-left" id="driveLeft">⬅️</button>
      <button class="dpad-btn dpad-down" id="driveDown">⬇️</button>
      <button class="dpad-btn dpad-right" id="driveRight">➡️</button>
    </div>
  </div>

  <footer>Made for Oliver 🚗</footer>

<script>
// ---------- clock ----------
function updateClock(){
  const now = new Date();
  document.getElementById("clock").textContent = now.toLocaleTimeString([], { hour:"2-digit", minute:"2-digit" });
}
updateClock();
setInterval(updateClock, 1000);

// ---------- audio ----------
let audioCtx;
function ctx(){
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function tone(freq, start, dur, type, gainMax){
  const c = ctx();
  const osc = c.createOscillator();
  const gain = c.createGain();
  osc.type = type || "sine";
  osc.frequency.setValueAtTime(freq, c.currentTime + start);
  gain.gain.setValueAtTime(0, c.currentTime + start);
  gain.gain.linearRampToValueAtTime(gainMax || 0.15, c.currentTime + start + 0.02);
  gain.gain.exponentialRampToValueAtTime(0.001, c.currentTime + start + dur);
  osc.connect(gain).connect(c.destination);
  osc.start(c.currentTime + start);
  osc.stop(c.currentTime + start + dur + 0.05);
}

// ---------- navigation ----------
const backBtn = document.getElementById("backBtn");
let ringInterval = null, callTimerInterval = null, spotifyInterval = null;
let spotifyPlaying = false, pcPlaying = false, callSeconds = 0;

function resetAppStates(){
  clearInterval(ringInterval); ringInterval = null;
  clearInterval(callTimerInterval); callTimerInterval = null;
  clearInterval(spotifyInterval); spotifyInterval = null;

  spotifyPlaying = false;
  document.getElementById("spotifyPlay").textContent = "▶️";
  document.getElementById("albumArt").classList.remove("spinning");

  pcPlaying = false;
  document.getElementById("pcPlay").textContent = "▶️";
  document.getElementById("pcWaveform").classList.remove("playing");

  callSeconds = 0;
  document.getElementById("callTimer").textContent = "00:00";
  document.getElementById("teamsIdle").style.display = "flex";
  document.getElementById("teamsIncoming").style.display = "none";
  document.getElementById("teamsActive").style.display = "none";

  document.getElementById("navBanner").style.display = "none";
  document.querySelectorAll(".car-dot").forEach(dot => {
    dot.style.left = "20%";
    dot.style.top = "75%";
  });
  document.getElementById("destPin").style.display = "none";
  document.getElementById("searchInput").value = "";
  quickPlacesCollapsed = false;
  renderQuickPlaces("");

  navigationActive = false;
  updateDriveControlsVisibility();
}

function showCarScreen(id){
  resetAppStates();
  document.querySelectorAll(".car-screen").forEach(s => s.classList.remove("active"));
  document.getElementById("screen-" + id).classList.add("active");
  backBtn.style.visibility = id === "home" ? "hidden" : "visible";
}
document.querySelectorAll(".car-app").forEach(b => b.addEventListener("click", () => showCarScreen(b.dataset.screen)));
backBtn.addEventListener("click", () => showCarScreen("home"));

// ---------- maps ----------
const CATEGORIES = {
  home:    { emoji:"🏠", label:"Home",    left:"78%", top:"14%", minutes:12 },
  food:    { emoji:"🍔", label:"Food",    left:"55%", top:"60%", minutes:8 },
  gas:     { emoji:"⛽", label:"Gas",     left:"35%", top:"25%", minutes:5 },
  coffee:  { emoji:"☕", label:"Coffee",  left:"60%", top:"20%", minutes:6 },
  parking: { emoji:"🅿️", label:"Parking", left:"45%", top:"45%", minutes:4 },
};

function goToDestination(banner, left, top, label, minutes){
  tone(880, 0, 0.1, "sine", 0.15);
  tone(660, 0.08, 0.15, "sine", 0.12);
  document.querySelectorAll(".car-dot").forEach(dot => {
    dot.style.left = left;
    dot.style.top = top;
  });
  banner.textContent = `Navigating to ${label}... ${minutes} min`;
  banner.style.display = "block";
  setTimeout(() => { banner.textContent = `You're at ${label}! 🎉`; }, 2000);

  navigationActive = true;
  updateDriveControlsVisibility();
}

// ---------- drive controls (manual steering while navigating) ----------
let navigationActive = false;
const DRIVE_STEP = 4;
function updateDriveControlsVisibility(){
  document.getElementById("driveControls").classList.toggle("visible", navigationActive);
}
function moveCar(dx, dy){
  tone(500, 0, 0.06, "triangle", 0.08);
  document.querySelectorAll(".car-dot").forEach(dot => {
    const left = Math.min(95, Math.max(5, parseFloat(dot.style.left) + dx));
    const top = Math.min(95, Math.max(5, parseFloat(dot.style.top) + dy));
    dot.style.left = left + "%";
    dot.style.top = top + "%";
  });
}
document.getElementById("driveUp").addEventListener("click", () => moveCar(0, -DRIVE_STEP));
document.getElementById("driveDown").addEventListener("click", () => moveCar(0, DRIVE_STEP));
document.getElementById("driveLeft").addEventListener("click", () => moveCar(-DRIVE_STEP, 0));
document.getElementById("driveRight").addEventListener("click", () => moveCar(DRIVE_STEP, 0));

document.getElementById("msSearchBtn").addEventListener("click", () => {
  tone(700, 0, 0.08, "sine", 0.1);
  showCarScreen("maps");
  document.getElementById("searchInput").focus();
});

// "Places you've been lately" — persists for the session, most recent first.
let recentPlaceIds = [];
function recordRecentPlace(catId){
  recentPlaceIds = [catId, ...recentPlaceIds.filter(id => id !== catId)];
}

// Quick places shows search matches while typing, or your recent places when
// the search bar is empty. The toggle arrow only appears when there's
// actually something to show — no recent places yet means no arrow.
let quickPlacesCollapsed = false;
function renderQuickPlaces(query){
  const quickPlaces = document.getElementById("quickPlaces");
  const toggleBtn = document.getElementById("quickToggleBtn");
  const ids = query
    ? Object.keys(CATEGORIES).filter(id => CATEGORIES[id].label.toLowerCase().includes(query))
    : recentPlaceIds;

  quickPlaces.innerHTML = ids.map(id => {
    const cat = CATEGORIES[id];
    return `<button class="category-btn" data-cat="${id}">${cat.emoji}<span>${cat.label}</span></button>`;
  }).join("");

  document.getElementById("noResultsMsg").style.display = (query && ids.length === 0) ? "block" : "none";

  if (ids.length === 0){
    quickPlaces.style.display = "none";
    toggleBtn.style.display = "none";
  } else {
    toggleBtn.style.display = "";
    toggleBtn.textContent = quickPlacesCollapsed ? "▼" : "▲";
    quickPlaces.style.display = quickPlacesCollapsed ? "none" : "grid";
  }
}
document.getElementById("quickToggleBtn").addEventListener("click", () => {
  quickPlacesCollapsed = !quickPlacesCollapsed;
  renderQuickPlaces(document.getElementById("searchInput").value.trim().toLowerCase());
});
document.getElementById("searchInput").addEventListener("input", (e) => {
  renderQuickPlaces(e.target.value.trim().toLowerCase());
});
document.getElementById("quickPlaces").addEventListener("click", (e) => {
  const btn = e.target.closest(".category-btn");
  if (btn) goToPlace(btn.dataset.cat);
});

function goToPlace(catId){
  const cat = CATEGORIES[catId];
  const destPin = document.getElementById("destPin");
  if (catId === "home"){
    destPin.style.display = "none";
  } else {
    destPin.textContent = cat.emoji;
    destPin.style.left = cat.left;
    destPin.style.top = cat.top;
    destPin.style.display = "block";
  }
  goToDestination(document.getElementById("navBanner"), cat.left, cat.top, cat.label, cat.minutes);
  recordRecentPlace(catId);
  renderQuickPlaces(document.getElementById("searchInput").value.trim().toLowerCase());
}

// ---------- spotify ----------
const SPOTIFY_NOTES = [392.00, 440.00, 523.25, 440.00];
document.getElementById("spotifyPlay").addEventListener("click", () => {
  spotifyPlaying = !spotifyPlaying;
  const btn = document.getElementById("spotifyPlay");
  const art = document.getElementById("albumArt");
  if (spotifyPlaying){
    btn.textContent = "⏸";
    art.classList.add("spinning");
    let i = 0;
    spotifyInterval = setInterval(() => {
      tone(SPOTIFY_NOTES[i % SPOTIFY_NOTES.length], 0, 0.35, "sine", 0.1);
      i++;
    }, 450);
  } else {
    btn.textContent = "▶️";
    art.classList.remove("spinning");
    clearInterval(spotifyInterval);
  }
});
document.getElementById("spotifyPrev").addEventListener("click", () => tone(330, 0, 0.1, "triangle", 0.1));
document.getElementById("spotifyNext").addEventListener("click", () => tone(550, 0, 0.1, "triangle", 0.1));

// ---------- pocket casts ----------
document.getElementById("pcPlay").addEventListener("click", () => {
  pcPlaying = !pcPlaying;
  document.getElementById("pcPlay").textContent = pcPlaying ? "⏸" : "▶️";
  document.getElementById("pcWaveform").classList.toggle("playing", pcPlaying);
});
document.getElementById("pcBack").addEventListener("click", () => tone(300, 0, 0.1, "triangle", 0.1));
document.getElementById("pcFwd").addEventListener("click", () => tone(500, 0, 0.1, "triangle", 0.1));

// ---------- teams ----------
function formatTime(s){
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return String(m).padStart(2, "0") + ":" + String(sec).padStart(2, "0");
}
document.getElementById("simulateCallBtn").addEventListener("click", () => {
  document.getElementById("teamsIdle").style.display = "none";
  document.getElementById("teamsIncoming").style.display = "flex";
  ringInterval = setInterval(() => {
    tone(600, 0, 0.15, "sine", 0.15);
    tone(500, 0.15, 0.15, "sine", 0.12);
  }, 1200);
});
document.getElementById("answerBtn").addEventListener("click", () => {
  clearInterval(ringInterval); ringInterval = null;
  document.getElementById("teamsIncoming").style.display = "none";
  document.getElementById("teamsActive").style.display = "flex";
  callSeconds = 0;
  callTimerInterval = setInterval(() => {
    callSeconds++;
    document.getElementById("callTimer").textContent = formatTime(callSeconds);
  }, 1000);
});
document.getElementById("declineBtn").addEventListener("click", () => {
  clearInterval(ringInterval); ringInterval = null;
  document.getElementById("teamsIncoming").style.display = "none";
  document.getElementById("teamsIdle").style.display = "flex";
});
document.getElementById("leaveBtn").addEventListener("click", () => {
  clearInterval(callTimerInterval); callTimerInterval = null;
  document.getElementById("teamsActive").style.display = "none";
  document.getElementById("teamsIdle").style.display = "flex";
  document.getElementById("callTimer").textContent = "00:00";
});

// ---------- multi-screen ----------
function renderMiniPlayer(app){
  const el = document.getElementById("miniPlayer");
  if (app === "spotify"){
    el.innerHTML = `<div class="mini-album">🎵</div><div class="mini-title">Sunshine Groove</div><button class="mini-play" id="miniPlayBtn">▶️</button>`;
  } else if (app === "teams"){
    el.innerHTML = `<div class="mini-album">👥</div><div class="mini-title">No active calls</div>`;
  } else {
    el.innerHTML = `<div class="mini-album">🎧</div><div class="mini-title">Mystery Explorers</div><button class="mini-play" id="miniPlayBtn">▶️</button>`;
  }
  const playBtn = document.getElementById("miniPlayBtn");
  if (playBtn){
    playBtn.addEventListener("click", () => {
      playBtn.textContent = playBtn.textContent === "▶️" ? "⏸" : "▶️";
    });
  }
}
document.querySelectorAll(".split-tab").forEach(t => {
  t.addEventListener("click", () => {
    document.querySelectorAll(".split-tab").forEach(x => x.classList.toggle("selected", x === t));
    renderMiniPlayer(t.dataset.app);
  });
});
renderMiniPlayer("spotify");

// ---------- voice assistant ----------
function showAssistantBanner(text, autoHideMs){
  const banner = document.getElementById("assistantBanner");
  clearTimeout(banner._hideTimeout);
  banner.textContent = text;
  banner.style.display = "block";
  if (autoHideMs){
    banner._hideTimeout = setTimeout(() => { banner.style.display = "none"; }, autoHideMs);
  }
}

const VOICE_COMMANDS = [
  { match:["main menu", "home screen", "dashboard"], reply:"Heading to the main menu!",
    action: () => showCarScreen("home") },
  { match:["open maps", "show maps"], reply:"Opening Maps!",
    action: () => showCarScreen("maps") },
  { match:["navigate home", "take me home", "drive home"], reply:"Navigating home!",
    action: () => { showCarScreen("maps"); goToPlace("home"); } },
  { match:["find food", "i'm hungry", "hungry", "food"], reply:"Finding food nearby!",
    action: () => { showCarScreen("maps"); goToPlace("food"); } },
  { match:["find gas", "need gas", "gas"], reply:"Finding gas nearby!",
    action: () => { showCarScreen("maps"); goToPlace("gas"); } },
  { match:["find coffee", "need coffee", "coffee"], reply:"Finding coffee nearby!",
    action: () => { showCarScreen("maps"); goToPlace("coffee"); } },
  { match:["find parking", "parking"], reply:"Finding parking nearby!",
    action: () => { showCarScreen("maps"); goToPlace("parking"); } },
  { match:["play music", "play song", "open spotify"], reply:"Playing some music!",
    action: () => { showCarScreen("spotify"); if (!spotifyPlaying) document.getElementById("spotifyPlay").click(); } },
  { match:["pause music", "stop music", "pause"], reply:"Music paused!",
    action: () => { if (spotifyPlaying) document.getElementById("spotifyPlay").click(); } },
  { match:["next song", "skip song", "skip"], reply:"Skipping to the next song!",
    action: () => document.getElementById("spotifyNext").click() },
  { match:["previous song", "last song", "go back a song"], reply:"Going back a song!",
    action: () => document.getElementById("spotifyPrev").click() },
  { match:["open teams", "start a call", "join meeting", "call someone"], reply:"Starting a call!",
    action: () => { showCarScreen("teams"); document.getElementById("simulateCallBtn").click(); } },
  { match:["hang up", "leave the call", "end call"], reply:"Ending the call!",
    action: () => document.getElementById("leaveBtn").click() },
  { match:["open pocket casts", "open podcast", "play podcast"], reply:"Playing your podcast!",
    action: () => { showCarScreen("pocketcasts"); if (!pcPlaying) document.getElementById("pcPlay").click(); } },
  { match:["multi screen", "split screen"], reply:"Switching to Multi-Screen!",
    action: () => showCarScreen("multiscreen") },
];

function handleVoiceCommand(transcript){
  const found = VOICE_COMMANDS.find(c => c.match.some(phrase => transcript.includes(phrase)));
  if (found){
    tone(880, 0, 0.1, "sine", 0.15);
    tone(660, 0.08, 0.15, "sine", 0.12);
    found.action();
    showAssistantBanner(`✨ Gemini: ${found.reply}`, 2800);
  } else {
    tone(300, 0, 0.18, "sine", 0.12);
    showAssistantBanner(`✨ Gemini: Sorry, I didn't catch a command in "${transcript}"`, 2800);
  }
}

const SpeechRecognitionImpl = window.SpeechRecognition || window.webkitSpeechRecognition;
const micBtn = document.getElementById("micBtn");
let recognizing = false;
let recognition = null;

if (SpeechRecognitionImpl){
  recognition = new SpeechRecognitionImpl();
  recognition.lang = "en-US";
  recognition.interimResults = false;
  recognition.maxAlternatives = 1;

  recognition.onstart = () => {
    recognizing = true;
    micBtn.classList.add("listening");
    showAssistantBanner("🎙️ Listening...");
  };
  recognition.onresult = (e) => {
    const transcript = e.results[0][0].transcript.toLowerCase().trim();
    handleVoiceCommand(transcript);
  };
  recognition.onerror = () => {
    showAssistantBanner("✨ Gemini: I didn't hear anything, try again!", 2800);
  };
  recognition.onend = () => {
    recognizing = false;
    micBtn.classList.remove("listening");
  };
}

micBtn.addEventListener("click", () => {
  if (!SpeechRecognitionImpl){
    showAssistantBanner("✨ Gemini: Voice isn't supported in this browser", 3000);
    return;
  }
  if (recognizing){
    recognition.stop();
    return;
  }
  tone(700, 0, 0.08, "sine", 0.1);
  try { recognition.start(); } catch (err) { /* already starting */ }
});
</script>
